<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offres d'emploi — Chasseur de tête</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">chasseur de tête</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="offres.html" class="active">Offres</a></li>
      <li id="navAuth">
        <a href="login.html" class="btn btn-outline">Connexion</a>
        <a href="register.html" class="btn btn-primary">S'inscrire</a>
      </li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="flex" style="min-height:calc(100vh - 60px)">
  <!-- Sidebar filtres -->
  <aside class="filters-sidebar">
    <p style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-600);margin-bottom:16px">Filtres</p>

    <label class="filter-label">Recherche</label>
    <input class="form-input" id="searchInput" type="text" placeholder="Poste, entreprise…" />

    <label class="filter-label">Localisation</label>
    <input class="form-input" id="locInput" type="text" placeholder="Antananarivo,Antsiranana…" />

    <label class="filter-label">Type de contrat</label>
    <select class="form-input" id="typeInput">
      <option value="">Tous</option>
      <option>CDI</option><option>CDD</option><option>Freelance</option><option>Stage</option><option>Alternance</option>
    </select>

    <label class="filter-label">Salaire min (MGA)</label>
    <input class="form-input" id="salInput" type="number" placeholder="ex : 40" min="0" max="200" />

    <button class="btn btn-primary" style="width:100%;margin-top:16px" id="filterBtn">Appliquer</button>
    <button class="btn btn-outline" style="width:100%;margin-top:8px" id="resetBtn">Réinitialiser</button>
  </aside>

  <!-- Contenu principal -->
  <main style="flex:1;padding:24px">
    <div id="companyHeader" style="display:none;margin-bottom:24px;padding:16px;background:var(--gray-50);border-radius:var(--radius-lg);border:1px solid var(--gray-200)">
      <div style="display:flex;align-items:center;gap:12px">
        <div id="companyLogo" style="width:48px;height:48px;border-radius:12px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;overflow:hidden"></div>
        <div>
          <h2 id="companyName" style="margin:0;font-size:20px"></h2>
          <p id="companySector" style="margin:4px 0 0;color:var(--gray-600);font-size:14px"></p>
        </div>
      </div>
      <a href="offres.html" style="margin-top:12px;display:inline-block;color:var(--blue-600);font-size:14px">← Voir toutes les offres</a>
    </div>

    <div class="flex justify-between items-center mb-3">
      <h1 class="page-title" style="margin:0">Offres d'emploi</h1>
      <span id="countLabel" class="text-sm text-muted">Chargement…</span>
    </div>

    <div class="pills" id="typePills">
      <button class="pill active" data-type="">Toutes</button>
      <button class="pill" data-type="CDI">CDI</button>
      <button class="pill" data-type="CDD">CDD</button>
      <button class="pill" data-type="Freelance">Freelance</button>
      <button class="pill" data-type="Stage">Stage</button>
      <button class="pill" data-type="Alternance">Alternance</button>
    </div>

    <div id="offresList"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script src="main.js"></script>
<script src="offres.js"></script>
</body>
</html>
